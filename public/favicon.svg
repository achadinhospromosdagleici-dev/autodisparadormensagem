  <!-- WhatsApp-style chat bubble (thick stroke) -->
  <path d="M100 140 
           C100 110 125 90 155 90 
           L357 90 
           C387 90 412 110 412 140 
           L412 340 
           C412 370 387 390 357 390 
           L180 390 
           L100 460 
           L130 390 
           L130 390 
           C100 390 100 370 100 340 
           Z" 
