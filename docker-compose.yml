version: "3.7"

services:
  frontend:
    build: ./frontend
    networks:
      - minha_rede
    depends_on:
      - backend
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: any
        delay: 5s
      labels:
        - traefik.enable=true
        - traefik.http.routers.nexiacred_frontend.rule=Host(`disparador.bigcreditos.com.br`)
        - traefik.http.routers.nexiacred_frontend.entrypoints=websecure
        - traefik.http.routers.nexiacred_frontend.tls.certresolver=letsencryptresolver
        - traefik.http.routers.nexiacred_frontend.priority=1
        - traefik.http.routers.nexiacred_frontend.service=nexiacred_frontend
        - traefik.http.services.nexiacred_frontend.loadbalancer.server.port=80
        - traefik.http.services.nexiacred_frontend.loadbalancer.passhostheader=true

  backend:
    build: ./backend
    networks:
      - minha_rede
    command: >
      /bin/sh -c "
      npx prisma db push &&
      node dist/index.js
      "
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@nexiacred_db:5432/${POSTGRES_DB}?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
    depends_on:
      - nexiacred_db
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 1024M
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5

  nexiacred_db:
    image: postgres:16-alpine
    networks:
      - minha_rede
    volumes:
      - nexiacred_pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 1024M
      restart_policy:
        condition: any
        delay: 5s

  pgadmin:
    image: dpage/pgadmin4
    networks:
      - minha_rede
    volumes:
      - nexiacred_pgadmin_data:/var/lib/pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
      - PGADMIN_CONFIG_SERVER_MODE=False
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: any
        delay: 5s
      labels:
        - traefik.enable=true
        - traefik.http.routers.nexiacred_pgadmin.rule=Host(`pgadmin-disparador.bigcreditos.com.br`)
        - traefik.http.routers.nexiacred_pgadmin.entrypoints=websecure
        - traefik.http.routers.nexiacred_pgadmin.tls.certresolver=letsencryptresolver
        - traefik.http.routers.nexiacred_pgadmin.priority=1
        - traefik.http.routers.nexiacred_pgadmin.service=nexiacred_pgadmin
        - traefik.http.services.nexiacred_pgadmin.loadbalancer.server.port=80
        - traefik.http.services.nexiacred_pgadmin.loadbalancer.passhostheader=true

volumes:
  nexiacred_pgdata:
    name: nexiacred_pgdata
  nexiacred_pgadmin_data:
    name: nexiacred_pgadmin_data

networks:
  minha_rede:
    external: true
    name: minha_rede
